services:
    ollama-arc-sycl:
        # Extends ollama-arc-sycl:3.3.4 (eleiton/ollama-intel-arc, Ollama v0.18.3)
        # with libsycl-native-bfloat16.spv missing from upstream build.
        # Run "docker compose build" first if ollama-arc-sycl:3.3.4 is not present:
        #   docker build --build-context ... (see Dockerfile.sycl-fix comments)
        build:
            context: .
            dockerfile: Dockerfile.sycl-fix
        image: ollama-arc-sycl:3.3.4-fixed
        container_name: ${CONTAINER_NAME:-ollama-arc-sycl}
        restart: unless-stopped

        # Arc A770 GPU device passthrough only (card1 + renderD129)
        devices:
            - ${GPU_CARD_DEVICE:-/dev/dri/card1}:${GPU_CARD_DEVICE:-/dev/dri/card1}
            - ${GPU_RENDER_DEVICE:-/dev/dri/renderD129}:${GPU_RENDER_DEVICE:-/dev/dri/renderD129}

        environment:
            # Level Zero / SYCL GPU init
            - OLLAMA_HOST=0.0.0.0
            - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-http://localhost:3000,http://localhost:11434}
            - ZES_ENABLE_SYSMAN=1
            - ZE_ENABLE_PCI_ID_DEVICE_ORDER=${ZE_ENABLE_PCI_ID_DEVICE_ORDER:-1}
            - ONEAPI_DEVICE_SELECTOR=${ONEAPI_DEVICE_SELECTOR:-level_zero:0}
            - SYCL_CACHE_PERSISTENT=1
            - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
            - UR_L0_USE_IMMEDIATE_COMMANDLISTS=1
            # Use F16 instead of BF16 — avoids missing libsycl-native-bfloat16.spv
            - GGML_SYCL_F16=1
            - no_proxy=localhost,127.0.0.1

            # Ollama performance settings (tuned for Arc A770 16GB VRAM)
            - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-32768}
            - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
            - OLLAMA_FLASH_ATTENTION=false
            - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE:-q8_0}
            - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
            - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}

        ports:
            - "${OLLAMA_PORT:-11434}:11434"

        volumes:
            # NVMe (f2fs/zstd) for low-latency model weight reads
            - ${MODELS_PATH:-./data/models}:/root/.ollama

        # Container runs as root; devices: block provides DRI access
        shm_size: 16g

        deploy:
            resources:
                limits:
                    memory: 32G
                    cpus: 8

        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 120s

